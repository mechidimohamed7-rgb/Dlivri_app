<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>واجهة عامل التوصيل</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>طلبات الزبائن</h1>

<div class="order">
<p><strong>الاسم:</strong> <span id="cName"></span></p>

<p><strong>رقم الهاتف:</strong> <span id="cPhone"></span></p>

<p><strong>العنوان:</strong> <span id="cAddress"></span></p>

<p><strong>الطلب:</strong></p>
<p id="cOrder"></p>

<p><strong>ملاحظات:</strong></p>
<p id="cNote"></p>

<button onclick="alert('تم قبول الطلب')">قبول الطلب</button>

<button onclick="alert('الطلب في الطريق')">في الطريق</button>

<button onclick="alert('تم تسليم الطلب')">تم التسليم</button>

</div>

</div>

<script>
document.getElementById("cName").innerHTML = localStorage.getItem("customerName") || "لا يوجد";
document.getElementById("cPhone").innerHTML = localStorage.getItem("customerPhone") || "لا يوجد";
document.getElementById("cAddress").innerHTML = localStorage.getItem("customerAddress") || "لا يوجد";
document.getElementById("cOrder").innerHTML = localStorage.getItem("customerOrder") || "لا يوجد طلب";
document.getElementById("cNote").innerHTML = localStorage.getItem("customerNote") || "لا توجد ملاحظات";
</script>

</body>
</html>
